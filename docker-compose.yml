services:
  app:
    build: .
    image: winton-tv:dev
    container_name: winton-tv
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Compose overrides the .env DATABASE_URL host since "localhost" doesn't
      # resolve to the postgres container from inside the app container.
      DATABASE_URL: postgres://winton:winton@postgres:5432/winton?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: winton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: winton
      POSTGRES_PASSWORD: winton
      POSTGRES_DB: winton
    ports:
      # Exposed for local dev tools (psql, DBeaver). Remove for true prod.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winton -d winton"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
