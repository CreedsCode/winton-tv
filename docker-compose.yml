# winton-tv full stack — app + postgres + redis + livekit + ingress.
# Designed for Dokploy "compose deploy from GitHub". Set secrets via
# Dokploy env vars. Required:
#   DISCORD_CLIENT_ID / DISCORD_CLIENT_SECRET / DISCORD_GUILD_ID
#   BASE_URL                       e.g. https://tv.winton.pro
#   LIVEKIT_API_KEY / _SECRET      generate with `livekit-server generate-keys`
#   LIVEKIT_PUBLIC_URL             e.g. wss://lk.winton.pro
#   INGRESS_WHIP_BASE_URL          e.g. https://whip.winton.pro/w
#
# Optional (default to in-cluster values):
#   DATABASE_URL                   defaults to postgres in this compose
#   LIVEKIT_URL                    defaults to ws://livekit:7880 (internal)
#   INGRESS_RTMP_BASE_URL          default falls back to localhost

services:
  app:
    build: .
    image: winton-tv:latest
    container_name: winton-tv
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BASE_URL: "${BASE_URL}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID}"
      DATABASE_URL: "${DATABASE_URL:-postgres://winton:winton@postgres:5432/winton?sslmode=disable}"
      LIVEKIT_URL: "${LIVEKIT_URL:-ws://livekit:7880}"
      LIVEKIT_PUBLIC_URL: "${LIVEKIT_PUBLIC_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      WHIP_BASE_URL: "${WHIP_BASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
      ingress:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: winton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: winton
      POSTGRES_PASSWORD: winton
      POSTGRES_DB: winton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winton -d winton"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: winton-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data

  # LiveKit server config supports env vars natively via LIVEKIT_KEYS, etc.,
  # so we still mount the static yaml.
  livekit:
    image: livekit/livekit-server:v1.7
    container_name: winton-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  # LiveKit Ingress reads almost nothing from env — config has to be a yaml
  # file. We use compose `configs:` with `content:` so env vars get
  # interpolated into the yaml at compose-up time. The standalone file
  # `deploy/ingress.yaml` is kept only as a reference for developers.
  ingress:
    image: livekit/ingress:v1.4
    container_name: winton-ingress
    restart: unless-stopped
    command: ["--config", "/etc/ingress.yaml"]
    ports:
      - "1935:1935"
      - "8082:8082"
    environment:
      INGRESS_API_KEY: "${LIVEKIT_API_KEY}"
      INGRESS_API_SECRET: "${LIVEKIT_API_SECRET}"
    configs:
      - source: ingress_config
        target: /etc/ingress.yaml
    depends_on:
      - livekit
      - redis

configs:
  ingress_config:
    content: |
      log_level: info
      ws_url: ws://livekit:7880
      redis:
        address: redis:6379
      rtmp_port: 1935
      whip_port: 8082
      http_relay_port: 9090
      whip_base_url: ${INGRESS_WHIP_BASE_URL:-http://localhost:8082/w}
      rtmp_base_url: ${INGRESS_RTMP_BASE_URL:-rtmp://localhost:1935/x}

volumes:
  pgdata:
  redisdata:
