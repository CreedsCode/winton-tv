# Local dev compose.
# Postgres + LiveKit get added in their respective feature PRs.
services:
  app:
    build: .
    image: winton-tv:dev
    container_name: winton-tv
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: "development"
