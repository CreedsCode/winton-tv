<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in &mdash; Winton Tv</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/static/favicon.svg" alt="" width="28" height="28">
      <span>Winton Tv</span>
    </a>
    <nav class="site-nav">
      <a href="/">Home</a>
    </nav>
  </header>

  <main>
    <section class="hero hero-narrow">
      <h1>Sign in</h1>
      <p class="lede">
        Winton Tv uses Discord OAuth. You must be a member of the
        Winton guild to stream or to post in chat.
      </p>

      {{if .Denied}}
      <div class="form-error" role="alert">
        Sign-in cancelled. <a href="/auth/discord">Try again?</a>
      </div>
      {{end}}

      <a class="btn btn-primary" href="/auth/discord">
        Login with Discord
      </a>
      <p class="back-link"><a href="/">&larr; Back home</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Open source &middot; <a href="https://github.com/CreedsCode/winton-tv">GitHub</a></p>
  </footer>
</body>
</html>
